<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Carrossel de Fotos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header class="logo">
            <img src="logo.png" alt="Logo da Página">
        </header>

        <section class="apresentacao">
            <h1>Bem-vindo à minha página</h1>
            <p>Veja abaixo nosso carrossel de fotos interativo.</p>
        </section>

        <!-- Carrossel -->
        <section class="carrossel-container">
            <h2>Galeria de Fotos</h2>
            <div class="carrossel">
                <button class="prev">&#10094;</button>
                <div class="slides">
                    <img src="/midia/foto1.jpg" alt="Foto 1">
                    <img src="/midia/foto2.jpeg" alt="Foto 2">
                    <img src="/midia/foto3.jpeg" alt="Foto 3">
                    <img src="/midia/foto4.jpeg" alt="Foto 4">
                </div>
                <button class="next">&#10095;</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
